<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de Sales</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #fff; }
    :root {
      --sp-blue: #0078d4; --sp-blue-dark: #005a9e; --sp-blue-light: #deecf9;
      --sp-neutral-10: #f3f2f1; --sp-neutral-20: #edebe9; --sp-neutral-30: #d2d0ce;
      --sp-neutral-60: #8a8886; --sp-neutral-90: #323130;
      --sp-green: #107c10; --sp-green-light: #dff6dd;
      --sp-red: #a4262c; --sp-red-light: #fde7e9;
      --sp-amber-light: #fff4ce;
      --slot-h: 32px;
    }
    .app { background: #fff; padding: 0; min-height: 600px; }
    .topbar { background: var(--sp-blue); padding: 10px 20px; display: flex; align-items: center; gap: 12px; }
    .topbar-title { color: #fff; font-size: 16px; font-weight: 600; }
    .topbar-icon { color: rgba(255,255,255,0.85); font-size: 20px; }
    .tabs { background: #fff; border-bottom: 1px solid var(--sp-neutral-30); display: flex; padding: 0 20px; }
    .tab { padding: 10px 16px; font-size: 14px; color: var(--sp-neutral-60); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; }
    .tab:hover { color: var(--sp-neutral-90); background: var(--sp-neutral-10); }
    .tab.active { color: var(--sp-blue); border-bottom: 2px solid var(--sp-blue); font-weight: 600; }
    .content { padding: 20px; }
    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .toolbar input, .toolbar select { height: 32px; font-size: 13px; padding: 0 10px; border: 1px solid var(--sp-neutral-30); border-radius: 2px; background: #fff; color: #323130; outline: none; }
    .toolbar input:focus, .toolbar select:focus { border-color: var(--sp-blue); box-shadow: 0 0 0 1px var(--sp-blue); }
    .btn { height: 32px; padding: 0 14px; font-size: 13px; font-weight: 600; border-radius: 2px; cursor: pointer; border: 1px solid transparent; transition: all 0.12s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--sp-blue); color: #fff; border-color: var(--sp-blue); }
    .btn-primary:hover { background: var(--sp-blue-dark); }
    .btn-ghost { background: transparent; color: var(--sp-blue); border-color: var(--sp-blue); }
    .btn-ghost:hover { background: var(--sp-blue-light); }
    .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .room-card { border: 1px solid var(--sp-neutral-30); border-radius: 2px; padding: 14px; background: #fff; cursor: pointer; transition: all 0.12s; }
    .room-card:hover { border-color: var(--sp-blue); box-shadow: 0 0 0 1px var(--sp-blue); }
    .room-name { font-size: 15px; font-weight: 600; color: #323130; margin-bottom: 8px; }
    .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 2px; }
    .badge-free { background: var(--sp-green-light); color: var(--sp-green); }
    .badge-busy { background: var(--sp-red-light); color: var(--sp-red); }
    .badge-soon { background: var(--sp-amber-light); color: #5d4037; }
    .reservas-list { display: flex; flex-direction: column; gap: 8px; }
    .reserva-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border: 1px solid var(--sp-neutral-30); border-radius: 2px; background: #fff; font-size: 13px; transition: background 0.1s; }
    .reserva-row:hover { background: var(--sp-neutral-10); }
    .reserva-sala { font-weight: 600; color: var(--sp-blue); width: 130px; flex-shrink: 0; }
    .reserva-hora { color: var(--sp-neutral-60); width: 130px; flex-shrink: 0; }
    .reserva-resp { flex: 1; color: #323130; }
    .reserva-titulo { flex: 1.5; color: #605e5c; font-style: italic; }
    .reserva-actions { display: flex; gap: 6px; }
    .icon-btn { background: none; border: none; cursor: pointer; color: var(--sp-neutral-60); font-size: 16px; padding: 4px; border-radius: 2px; transition: all 0.1s; }
    .icon-btn:hover { background: var(--sp-neutral-20); color: var(--sp-blue); }
    .icon-btn.danger:hover { color: var(--sp-red); }
    /* ── CALENDARI ── */
    .cal-wrap { min-width: 620px; }
    .cal-header { display: grid; grid-template-columns: 64px repeat(7, 1fr); border-bottom: 1px solid var(--sp-neutral-30); }
    .cal-cell { font-size: 12px; font-weight: 600; color: var(--sp-neutral-60); text-align: center; padding: 6px 2px; }
    .cal-grid { display: grid; grid-template-columns: 64px repeat(7, 1fr); position: relative; }
    .cal-time-col { display: flex; flex-direction: column; }
    .cal-time { font-size: 11px; color: var(--sp-neutral-60); text-align: right; padding-right: 8px; height: var(--slot-h); display: flex; align-items: flex-start; padding-top: 2px; }
    .cal-day-col { position: relative; border-left: 1px solid var(--sp-neutral-20); }
    .cal-slot { height: var(--slot-h); border-bottom: 1px solid var(--sp-neutral-20); cursor: pointer; transition: background 0.1s; }
    .cal-slot:hover { background: var(--sp-blue-light); }
    .cal-event-block {
      position: absolute; left: 2px; right: 2px;
      background: var(--sp-blue); color: #fff;
      font-size: 11px; font-weight: 600; border-radius: 3px;
      padding: 3px 6px; overflow: hidden; cursor: pointer; z-index: 2;
      display: flex; flex-direction: column; justify-content: flex-start;
      line-height: 1.3; transition: filter 0.1s;
    }
    .cal-event-block:hover { filter: brightness(1.1); }
    .cal-event-block.alt { background: #e35d30; }
    .cal-event-block .ev-title { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cal-event-block .ev-time { font-size: 10px; opacity: 0.9; white-space: nowrap; }
    .cal-hint { font-size: 11px; color: var(--sp-neutral-60); margin-top: 6px; font-style: italic; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: #fff; border-radius: 2px; padding: 24px; width: 460px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,0.22); }
    .modal-title { font-size: 18px; font-weight: 600; color: #323130; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .form-row { margin-bottom: 14px; }
    .form-label { font-size: 12px; font-weight: 600; color: #605e5c; margin-bottom: 4px; display: block; }
    .form-input { width: 100%; height: 32px; font-size: 13px; padding: 0 10px; border: 1px solid var(--sp-neutral-30); border-radius: 2px; background: #fff; color: #323130; outline: none; }
    .form-input:focus { border-color: var(--sp-blue); box-shadow: 0 0 0 1px var(--sp-blue); }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; border-top: 1px solid var(--sp-neutral-20); padding-top: 16px; }
    .empty { text-align: center; padding: 40px 20px; color: var(--sp-neutral-60); font-size: 14px; }
    .empty i { font-size: 36px; display: block; margin-bottom: 8px; opacity: 0.4; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .stat-card { background: var(--sp-neutral-10); border-radius: 2px; padding: 14px; text-align: center; }
    .stat-num { font-size: 28px; font-weight: 600; color: var(--sp-blue); line-height: 1; }
    .stat-label { font-size: 12px; color: var(--sp-neutral-60); margin-top: 4px; }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <i class="ti ti-building topbar-icon" aria-hidden="true"></i>
    <span class="topbar-title">Gestor de Sales</span>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="showTab('disponibilitat')"><i class="ti ti-layout-grid" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>Disponibilitat</div>
    <div class="tab" onclick="showTab('reserves')"><i class="ti ti-calendar-event" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>Reserves</div>
    <div class="tab" onclick="showTab('calendari')"><i class="ti ti-calendar" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>Calendari</div>
  </div>

  <div class="content" id="tab-disponibilitat">
    <div class="stats-row" id="stats-row"></div>
    <div class="toolbar">
      <input type="text" id="search-rooms" placeholder="Cercar sala..." style="width:180px" oninput="renderRooms()">
      <select id="filter-status" onchange="renderRooms()">
        <option value="">Tots els estats</option>
        <option value="lliure">Lliure</option>
        <option value="ocupada">Ocupada</option>
        <option value="aviat">Propera reserva</option>
      </select>
      <button class="btn btn-primary" onclick="openModal()"><i class="ti ti-plus"></i> Nova reserva</button>
    </div>
    <div class="rooms-grid" id="rooms-grid"></div>
  </div>

  <div class="content" id="tab-reserves" style="display:none">
    <div class="toolbar">
      <input type="date" id="filter-date" onchange="renderReserves()" style="width:150px">
      <select id="filter-sala" onchange="renderReserves()" style="width:200px">
        <option value="">Totes les sales</option>
      </select>
      <input type="text" id="filter-resp" placeholder="Cercar responsable..." oninput="renderReserves()" style="width:180px">
      <button class="btn btn-primary" onclick="openModal()"><i class="ti ti-plus"></i> Nova reserva</button>
    </div>
    <div id="reserves-container"></div>
  </div>

  <div class="content" id="tab-calendari" style="display:none">
    <div class="toolbar">
      <button class="btn btn-ghost" onclick="calPrevWeek()"><i class="ti ti-chevron-left"></i></button>
      <span id="cal-week-label" style="font-size:14px;font-weight:600;color:#323130;min-width:200px;text-align:center"></span>
      <button class="btn btn-ghost" onclick="calNextWeek()"><i class="ti ti-chevron-right"></i></button>
      <select id="cal-filter-sala" onchange="renderCalendari()" style="width:200px;margin-left:auto">
        <option value="">Totes les sales</option>
      </select>
    </div>
    <div id="calendari-container" style="overflow-x:auto"></div>
    <div class="cal-hint"><i class="ti ti-mouse" style="font-size:12px;vertical-align:-1px"></i> Doble clic sobre una reserva per editar-la &middot; Clic sobre una franja buida per crear-ne una</div>
  </div>
</div>

<div id="modal-bg" style="display:none">
  <div class="modal">
    <div class="modal-title"><i class="ti ti-calendar-plus" aria-hidden="true"></i> <span id="modal-title-text">Nova reserva</span></div>
    <div class="form-row">
      <label class="form-label">Sala</label>
      <select class="form-input" id="f-sala"></select>
    </div>
    <div class="form-row">
      <label class="form-label">T&iacute;tol / Motiu</label>
      <input class="form-input" id="f-titulo" type="text" placeholder="Ex: Reuni&oacute; d'equip">
    </div>
    <div class="form-row">
      <label class="form-label">Responsable</label>
      <input class="form-input" id="f-resp" type="text" placeholder="Nom del responsable">
    </div>
    <div class="form-row">
      <label class="form-label">Data</label>
      <input class="form-input" id="f-fecha" type="date">
    </div>
    <div class="form-row-2">
      <div>
        <label class="form-label">Hora inici</label>
        <select class="form-input" id="f-inicio" onchange="updateHoraFi()"></select>
      </div>
      <div>
        <label class="form-label">Hora fi</label>
        <select class="form-input" id="f-fin"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel&middot;lar</button>
      <button class="btn btn-primary" onclick="saveReserva()"><i class="ti ti-check"></i> Desar</button>
    </div>
  </div>
</div>

<script>
var SALES = [
  { id: 1, nombre: 'Sala Consell' },
  { id: 2, nombre: 'Sala Director' },
  { id: 3, nombre: 'Auditori' },
  { id: 4, nombre: 'Sala \u00d2pera Gran' },
  { id: 5, nombre: 'Sala \u00d2pera Petita' },
  { id: 6, nombre: 'Sala Eutime' },
];

var CAL_START = 8;
var CAL_END   = 19;
var SLOT_H    = 32;

var today = new Date();
function fmtDate(d) { return d.toISOString().split('T')[0]; }
function todayStr() { return fmtDate(today); }
function toMin(h, m) { return h * 60 + m; }
function fromMin(m) { return String(Math.floor(m/60)).padStart(2,'0') + ':' + String(m%60).padStart(2,'0'); }

var DIES_CA  = ['dg.','dl.','dt.','dc.','dj.','dv.','ds.'];
var MESOS_CA = ['gen.','feb.','mar\u00e7','abr.','maig','juny','jul.','ag.','set.','oct.','nov.','des.'];

function fmtWeekRange(d0, d6) {
  return d0.getDate() + ' ' + MESOS_CA[d0.getMonth()] + ' \u2013 ' + d6.getDate() + ' ' + MESOS_CA[d6.getMonth()] + ' ' + d6.getFullYear();
}
function fmtLongDate(dateStr) {
  var d = new Date(dateStr + 'T12:00:00');
  var dl = ['diumenge','dilluns','dimarts','dimecres','dijous','divendres','dissabte'];
  var ml = ['gener','febrer','mar\u00e7','abril','maig','juny','juliol','agost','setembre','octubre','novembre','desembre'];
  return dl[d.getDay()] + ', ' + d.getDate() + ' de ' + ml[d.getMonth()] + ' de ' + d.getFullYear();
}

function updateHoraFi() {
  var inicio = document.getElementById('f-inicio').value;
  if (!inicio) return;
  var parts = inicio.split(':');
  var finMin = toMin(+parts[0], +parts[1]) + 60;
  document.getElementById('f-fin').value = fromMin(Math.min(finMin, toMin(20, 30)));
}

var reserves = [
  { id: 1, salaId: 1, titulo: 'Reuni\u00f3 de direcci\u00f3', resp: 'Maria L\u00f3pez', fecha: todayStr(), inicio: '09:00', fin: '10:30' },
  { id: 2, salaId: 3, titulo: 'Assaig general', resp: 'Carles Ruiz', fecha: todayStr(), inicio: '10:00', fin: '12:00' },
  { id: 3, salaId: 2, titulo: 'Entrevista candidat', resp: 'Anna Garc\u00eda', fecha: todayStr(), inicio: '12:00', fin: '13:00' },
  { id: 4, salaId: 4, titulo: "Formaci\u00f3 d'equip", resp: 'Pere Sanz', fecha: todayStr(), inicio: '15:00', fin: '17:00' },
  { id: 5, salaId: 1, titulo: 'Kickoff projecte', resp: 'Lucia Torres', fecha: fmtDate(new Date(today.getTime()+86400000)), inicio: '09:30', fin: '11:30' },
  { id: 6, salaId: 5, titulo: 'Comit\u00e8 mensual', resp: 'David Mora', fecha: fmtDate(new Date(today.getTime()+86400000)), inicio: '10:00', fin: '12:00' },
];
var nextId = 7, editingId = null, calOffset = 0;

function nowMin() { var n = new Date(); return n.getHours() * 60 + n.getMinutes(); }

function getSalaStatus(salaId) {
  var nm = nowMin();
  var todayR = reserves.filter(function(r){ return r.salaId === salaId && r.fecha === todayStr(); });
  for (var i = 0; i < todayR.length; i++) {
    var r = todayR[i];
    var p = r.inicio.split(':'), q = r.fin.split(':');
    var s = toMin(+p[0],+p[1]), e = toMin(+q[0],+q[1]);
    if (nm >= s && nm < e) return 'ocupada';
    if (nm < s && s - nm <= 60) return 'aviat';
  }
  return 'lliure';
}

function getNextReserva(salaId) {
  var nm = nowMin();
  var todayR = reserves.filter(function(r){ return r.salaId === salaId && r.fecha === todayStr(); });
  var next = null, minDiff = Infinity;
  for (var i = 0; i < todayR.length; i++) {
    var r = todayR[i];
    var p = r.inicio.split(':');
    var s = toMin(+p[0],+p[1]);
    if (s > nm && s - nm < minDiff) { minDiff = s - nm; next = r; }
  }
  return next;
}

function renderRooms() {
  var q = document.getElementById('search-rooms').value.toLowerCase();
  var fs = document.getElementById('filter-status').value;
  var html = '';
  SALES.forEach(function(s) {
    var status = getSalaStatus(s.id);
    if (q && s.nombre.toLowerCase().indexOf(q) === -1) return;
    if (fs && status !== fs) return;
    var next = getNextReserva(s.id);
    var cur = reserves.find(function(r) {
      if (r.salaId !== s.id || r.fecha !== todayStr()) return false;
      var nm = nowMin(), p = r.inicio.split(':'), q2 = r.fin.split(':');
      return nm >= toMin(+p[0],+p[1]) && nm < toMin(+q2[0],+q2[1]);
    });
    var badge = status === 'lliure' ? '<span class="badge badge-free">Lliure</span>'
      : status === 'ocupada' ? '<span class="badge badge-busy">Ocupada</span>'
      : '<span class="badge badge-soon">Aviat ocupada</span>';
    var info = '';
    if (status === 'ocupada' && cur) info = '<div style="font-size:11px;color:#8a8886;margin-top:4px"><i class="ti ti-user" style="font-size:11px"></i> ' + cur.resp + ' &middot; fins ' + cur.fin + '</div>';
    else if (next) info = '<div style="font-size:11px;color:#8a8886;margin-top:4px"><i class="ti ti-clock" style="font-size:11px"></i> Prop. ' + next.inicio + ' &middot; ' + next.resp + '</div>';
    html += '<div class="room-card" onclick="filterBySala(' + s.id + ')">'
      + '<div class="room-name">' + s.nombre + '</div>' + badge + info
      + '<div style="margin-top:10px"><button class="btn btn-ghost" style="height:26px;font-size:12px;padding:0 10px" onclick="event.stopPropagation();openModalForSala(' + s.id + ')"><i class="ti ti-plus"></i> Reservar</button></div>'
      + '</div>';
  });
  if (!html) html = '<div class="empty" style="grid-column:1/-1"><i class="ti ti-building-off"></i>No s\'han trobat sales</div>';
  document.getElementById('rooms-grid').innerHTML = html;
  renderStats();
}

function renderStats() {
  var lliures = SALES.filter(function(s){ return getSalaStatus(s.id) === 'lliure'; }).length;
  var ocupades = SALES.filter(function(s){ return getSalaStatus(s.id) === 'ocupada'; }).length;
  var total = reserves.filter(function(r){ return r.fecha === todayStr(); }).length;
  document.getElementById('stats-row').innerHTML =
    '<div class="stat-card"><div class="stat-num" style="color:#107c10">' + lliures + '</div><div class="stat-label">Sales lliures ara</div></div>' +
    '<div class="stat-card"><div class="stat-num" style="color:#a4262c">' + ocupades + '</div><div class="stat-label">Sales ocupades</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + SALES.length + '</div><div class="stat-label">Total sales</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + total + '</div><div class="stat-label">Reserves avui</div></div>';
}

function renderReserves() {
  var fd = document.getElementById('filter-date').value;
  var fs = document.getElementById('filter-sala').value;
  var fr = document.getElementById('filter-resp').value.toLowerCase();
  var filtered = reserves.filter(function(r) {
    if (fd && r.fecha !== fd) return false;
    if (fs && r.salaId !== parseInt(fs)) return false;
    if (fr && r.resp.toLowerCase().indexOf(fr) === -1) return false;
    return true;
  });
  filtered.sort(function(a,b){ return a.fecha.localeCompare(b.fecha) || a.inicio.localeCompare(b.inicio); });
  var c = document.getElementById('reserves-container');
  if (!filtered.length) { c.innerHTML = '<div class="empty"><i class="ti ti-calendar-off"></i>No hi ha reserves amb aquests filtres</div>'; return; }
  var html = '<div class="reservas-list">', lastDate = '';
  filtered.forEach(function(r) {
    var sala = SALES.find(function(s){ return s.id === r.salaId; });
    if (r.fecha !== lastDate) {
      lastDate = r.fecha;
      html += '<div style="font-size:12px;font-weight:600;color:#8a8886;padding:8px 0 4px;border-bottom:1px solid #edebe9;margin-top:4px">' + fmtLongDate(r.fecha) + '</div>';
    }
    html += '<div class="reserva-row">'
      + '<div class="reserva-sala">' + (sala ? sala.nombre : '&mdash;') + '</div>'
      + '<div class="reserva-hora"><i class="ti ti-clock" style="font-size:12px;vertical-align:-1px"></i> ' + r.inicio + '&ndash;' + r.fin + '</div>'
      + '<div class="reserva-resp"><i class="ti ti-user" style="font-size:12px;vertical-align:-1px"></i> ' + r.resp + '</div>'
      + '<div class="reserva-titulo">' + r.titulo + '</div>'
      + '<div class="reserva-actions">'
      + '<button class="icon-btn" onclick="editReserva(' + r.id + ')" title="Editar"><i class="ti ti-edit"></i></button>'
      + '<button class="icon-btn danger" onclick="deleteReserva(' + r.id + ')" title="Eliminar"><i class="ti ti-trash"></i></button>'
      + '</div></div>';
  });
  c.innerHTML = html + '</div>';
}

function renderCalendari() {
  var base = new Date(today);
  base.setDate(base.getDate() + calOffset * 7 - base.getDay() + 1);
  var days = [];
  for (var i = 0; i < 7; i++) { var d = new Date(base); d.setDate(base.getDate() + i); days.push(d); }
  var fs = document.getElementById('cal-filter-sala').value;
  document.getElementById('cal-week-label').textContent = fmtWeekRange(days[0], days[6]);

  var hours = [];
  for (var h = CAL_START; h < CAL_END; h++) hours.push(h);
  var totalH = (CAL_END - CAL_START) * SLOT_H;

  var html = '<div class="cal-wrap"><div class="cal-header"><div class="cal-cell"></div>';
  days.forEach(function(d) {
    var isTod = fmtDate(d) === todayStr();
    html += '<div class="cal-cell" style="' + (isTod ? 'color:#0078d4;' : '') + '">'
      + DIES_CA[d.getDay()] + ' <span style="display:block;font-size:16px;font-weight:' + (isTod?'700':'400') + '">' + d.getDate() + '</span></div>';
  });
  html += '</div><div class="cal-grid">';

  // Columna hores
  html += '<div class="cal-time-col">';
  hours.forEach(function(h) { html += '<div class="cal-time">' + h + ':00</div>'; });
  html += '</div>';

  // Columna per dia
  days.forEach(function(d) {
    var ds = fmtDate(d);
    html += '<div class="cal-day-col" style="height:' + totalH + 'px">';
    // Franges clicables
    hours.forEach(function(h) {
      html += '<div class="cal-slot" onclick="openModalForDate(\'' + ds + '\',\'' + String(h).padStart(2,'0') + ':00\')"></div>';
    });
    // Events
    var dayReserves = reserves.filter(function(r) {
      if (r.fecha !== ds) return false;
      if (fs && r.salaId !== parseInt(fs)) return false;
      return true;
    });
    dayReserves.forEach(function(r, idx) {
      var sala = SALES.find(function(s){ return s.id === r.salaId; });
      var pi = r.inicio.split(':'), pf = r.fin.split(':');
      var startMin = toMin(+pi[0], +pi[1]);
      var endMin   = toMin(+pf[0], +pf[1]);
      var calStartMin = CAL_START * 60;
      var topPx    = ((startMin - calStartMin) / 60) * SLOT_H;
      var heightPx = ((endMin - startMin) / 60) * SLOT_H - 2;
      if (topPx >= totalH || heightPx <= 0) return;
      var clampedTop = Math.max(0, topPx);
      var clampedH   = Math.min(heightPx, totalH - clampedTop);
      var label = (sala ? sala.nombre : '') + ': ' + r.titulo;
      var display = label.length > 30 ? label.slice(0, 30) + '\u2026' : label;
      var tooltip = (sala ? sala.nombre : '') + ' \u00b7 ' + r.titulo + ' (' + r.resp + ') ' + r.inicio + '\u2013' + r.fin;
      var timeRow = clampedH > 24 ? '<div class="ev-time">' + r.inicio + '\u2013' + r.fin + '</div>' : '';
      html += '<div class="cal-event-block' + (idx % 2 === 1 ? ' alt' : '') + '"'
        + ' style="top:' + clampedTop + 'px;height:' + clampedH + 'px"'
        + ' title="' + tooltip + '"'
        + ' ondblclick="editReserva(' + r.id + ');event.stopPropagation();"'
        + ' onclick="event.stopPropagation();">'
        + '<div class="ev-title">' + display + '</div>' + timeRow
        + '</div>';
    });
    html += '</div>';
  });

  html += '</div></div>';
  document.getElementById('calendari-container').innerHTML = html;
}

function populateSelects() {
  ['filter-sala','cal-filter-sala'].forEach(function(id) {
    var el = document.getElementById(id);
    el.innerHTML = '<option value="">Totes les sales</option>';
    SALES.forEach(function(s){ var o = document.createElement('option'); o.value = s.id; o.textContent = s.nombre; el.appendChild(o); });
  });
  var fSala = document.getElementById('f-sala');
  fSala.innerHTML = '';
  SALES.forEach(function(s){ var o = document.createElement('option'); o.value = s.id; o.textContent = s.nombre; fSala.appendChild(o); });
  var times = [];
  for (var h = 7; h <= 20; h++) { times.push(String(h).padStart(2,'0') + ':00'); times.push(String(h).padStart(2,'0') + ':30'); }
  ['f-inicio','f-fin'].forEach(function(id) {
    var el = document.getElementById(id);
    el.innerHTML = '';
    times.forEach(function(t){ var o = document.createElement('option'); o.value = t; o.textContent = t; el.appendChild(o); });
  });
}

function openModal(prefill) {
  editingId = null;
  document.getElementById('modal-title-text').textContent = 'Nova reserva';
  document.getElementById('f-sala').value = (prefill && prefill.salaId) ? prefill.salaId : SALES[0].id;
  document.getElementById('f-titulo').value = '';
  document.getElementById('f-resp').value = '';
  document.getElementById('f-fecha').value = (prefill && prefill.fecha) ? prefill.fecha : todayStr();
  var inicio = (prefill && prefill.inicio) ? prefill.inicio : '09:00';
  document.getElementById('f-inicio').value = inicio;
  var parts = inicio.split(':');
  document.getElementById('f-fin').value = fromMin(Math.min(toMin(+parts[0], +parts[1]) + 60, toMin(20, 30)));
  document.getElementById('modal-bg').style.display = 'flex';
}
function openModalForSala(salaId) { openModal({ salaId: salaId }); }
function openModalForDate(fecha, inicio) { openModal({ fecha: fecha, inicio: inicio }); }

function editReserva(id) {
  var r = reserves.find(function(x){ return x.id === id; });
  if (!r) return;
  editingId = id;
  document.getElementById('modal-title-text').textContent = 'Editar reserva';
  document.getElementById('f-sala').value = r.salaId;
  document.getElementById('f-titulo').value = r.titulo;
  document.getElementById('f-resp').value = r.resp;
  document.getElementById('f-fecha').value = r.fecha;
  document.getElementById('f-inicio').value = r.inicio;
  document.getElementById('f-fin').value = r.fin;
  document.getElementById('modal-bg').style.display = 'flex';
}

function closeModal() { document.getElementById('modal-bg').style.display = 'none'; }

function saveReserva() {
  var data = {
    salaId: parseInt(document.getElementById('f-sala').value),
    titulo: document.getElementById('f-titulo').value.trim() || 'Sense t\u00edtol',
    resp: document.getElementById('f-resp').value.trim() || 'Sense responsable',
    fecha: document.getElementById('f-fecha').value,
    inicio: document.getElementById('f-inicio').value,
    fin: document.getElementById('f-fin').value,
  };
  if (!data.fecha) return;
  if (editingId) {
    var idx = reserves.findIndex(function(r){ return r.id === editingId; });
    reserves[idx] = Object.assign({}, data, { id: editingId });
  } else {
    reserves.push(Object.assign({}, data, { id: nextId++ }));
  }
  closeModal();
  renderAll();
}

function deleteReserva(id) {
  if (!confirm('Voleu eliminar aquesta reserva?')) return;
  reserves = reserves.filter(function(r){ return r.id !== id; });
  renderAll();
}

function filterBySala(salaId) {
  showTab('reserves');
  document.getElementById('filter-sala').value = salaId;
  document.getElementById('filter-date').value = '';
  renderReserves();
}

function showTab(name) {
  ['disponibilitat','reserves','calendari'].forEach(function(t) {
    document.getElementById('tab-' + t).style.display = t === name ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach(function(el, i) {
    el.classList.toggle('active', ['disponibilitat','reserves','calendari'][i] === name);
  });
  if (name === 'calendari') renderCalendari();
  if (name === 'reserves') renderReserves();
}

function calPrevWeek() { calOffset--; renderCalendari(); }
function calNextWeek() { calOffset++; renderCalendari(); }

function renderAll() {
  renderRooms();
  renderReserves();
  var calTab = document.getElementById('tab-calendari');
  if (calTab && calTab.style.display !== 'none') renderCalendari();
}

populateSelects();
renderAll();
</script>
</body>
</html>
